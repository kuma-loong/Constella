<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" role="img" aria-labelledby="title desc">
  <title id="title">Constella README logo</title>
  <desc id="desc">A transparent horizontal constellation mark for Constella.</desc>
  <defs>
    <linearGradient id="readmeLine" x1="44" y1="92" x2="322" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="44%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="readmeStarFill" x1="44" y1="92" x2="322" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="48%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="readmeSoftGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3.8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.15 0 0 0 0 0.56 0 0 0 0 0.98 0 0 0 0.72 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="readmeHeptastar">
      <path d="M0-11 2.6-3.2 9.5-6.9 5.7-.1 11 5.8 3.1 3.7 1.9 11-2.4 4.4-9.5 6.9-4.8.5-8.6-5.8-1.5-3.8Z"/>
    </g>
  </defs>

  <g fill="#93c5fd" opacity="0.42">
    <circle cx="34" cy="42" r="1.4"/>
    <circle cx="80" cy="33" r="1.1"/>
    <circle cx="133" cy="45" r="1.3"/>
    <circle cx="244" cy="36" r="1.2"/>
    <circle cx="327" cy="83" r="1.5"/>
    <circle cx="54" cy="136" r="1.2"/>
    <circle cx="178" cy="158" r="1.1"/>
    <circle cx="294" cy="143" r="1.3"/>
  </g>

  <g fill="none" stroke="url(#readmeLine)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" filter="url(#readmeSoftGlow)">
    <path d="M48 96 112 107 154 136 196 88 226 54 256 26"/>
    <path d="M154 136 96 151"/>
    <path d="M196 88 274 73 322 42"/>
  </g>

  <g fill="url(#readmeStarFill)" stroke="#eff6ff" stroke-width="1.1" filter="url(#readmeSoftGlow)">
    <use href="#readmeHeptastar" transform="translate(48 96) scale(0.55)"/>
    <use href="#readmeHeptastar" transform="translate(112 107) scale(0.48)"/>
    <use href="#readmeHeptastar" transform="translate(154 136) scale(0.66)"/>
    <use href="#readmeHeptastar" transform="translate(96 151) scale(0.48)"/>
    <use href="#readmeHeptastar" transform="translate(196 88) scale(0.58)"/>
    <use href="#readmeHeptastar" transform="translate(226 54) scale(0.55)"/>
    <use href="#readmeHeptastar" transform="translate(256 26) scale(0.48)"/>
    <use href="#readmeHeptastar" transform="translate(274 73) scale(0.52)"/>
    <use href="#readmeHeptastar" transform="translate(322 42) scale(0.48)"/>
  </g>
</svg>
